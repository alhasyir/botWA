<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Dokter - Klinik Gigi Tobi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-available {
            background: #dcfce7;
            color: #166534;
        }

        .tag-booked {
            background: #fee2e2;
            color: #991b1b;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-wa:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>

<body class="min-h-screen">
    <!-- Header -->
    <header class="py-12 px-6 text-center">
        <div class="inline-flex items-center justify-center p-4 bg-white rounded-3xl shadow-sm mb-6 border border-slate-100">
            <span class="text-4xl text-indigo-600">🦷</span>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Jadwal Online Klinik Gigi Tobi</h1>
        <p class="text-slate-500 mt-2 font-medium max-w-lg mx-auto">Silakan lihat ketersediaan jam praktik dokter gigi di bawah ini untuk merencanakan kunjungan Anda.</p>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-20">
        <!-- Schedule Section -->
        <div class="glass-card rounded-[2.5rem] p-8 mb-8 mt-4 border border-white">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">Pilih Tanggal Kunjungan</h2>
                    <p class="text-sm text-slate-400 font-medium uppercase tracking-widest mt-1">Estimasi Durasi: 30 Menit / Pasien</p>
                </div>
                <div class="flex items-center space-x-2 w-full overflow-x-auto pb-2 no-scrollbar">
                    <div id="day-tabs" class="flex space-x-3">
                        <!-- Tabs will be rendered here -->
                    </div>
                </div>
            </div>

            <div id="timeline-container" class="space-y-4">
                <!-- Timeline items will appear here -->
                <div id="loading" class="animate-pulse space-y-4">
                    <div class="h-20 bg-slate-100 rounded-3xl"></div>
                    <div class="h-20 bg-slate-100 rounded-3xl"></div>
                    <div class="h-20 bg-slate-100 rounded-3xl"></div>
                </div>
            </div>
        </div>

        <!-- CTA Section -->
        <div class="mt-12 text-center">
            <div class="inline-block p-1 bg-white rounded-3xl shadow-lg mb-4">
                <a id="booking-link" href="#" target="_blank"
                    class="btn-wa inline-flex items-center px-12 py-6 rounded-[2rem] font-black text-2xl shadow-xl transition-all duration-300">
                    <svg class="w-8 h-8 mr-3 fill-current" viewBox="0 0 24 24">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                    </svg>
                    Booking via WhatsApp
                </a>
            </div>
            <p class="text-[11px] text-slate-400 mt-8 tracking-[0.3em] font-black uppercase flex items-center justify-center gap-3">
                <span class="w-12 h-[1px] bg-slate-200"></span>
                Official Digital Schedule
                <span class="w-12 h-[1px] bg-slate-200"></span>
            </p>
        </div>
    </main>

    <script>
        const dayTabs = document.getElementById('day-tabs');
        const timelineContainer = document.getElementById('timeline-container');
        const bookingLink = document.getElementById('booking-link');

        const WA_NUMBER = "6281390149191";
        const SCHEDULE_API = "/api/reservations";

        let selectedFullDate = "";
        let allReservations = [];

        const DAYS_INDO = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const MONTHS_INDO = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        async function init() {
            generateTabs();
            await fetchClinicSchedule();
            await fetchReservations();
            // Polling refresh every 30 seconds
            setInterval(() => {
                fetchClinicSchedule();
                fetchReservations();
            }, 30000);
        }

        async function fetchReservations() {
            try {
                const response = await fetch(SCHEDULE_API);
                allReservations = await response.json();
                renderTimeline();
            } catch (err) {
                console.error("Gagal mengambil data jadwal:", err);
            }
        }

        function generateTabs() {
            const now = new Date();
            let html = '';
            for (let i = 0; i < 14; i++) {
                const date = new Date();
                date.setDate(now.getDate() + i);

                const dayName = DAYS_INDO[date.getDay()];
                const dayLabel = dayName.substring(0, 3);
                const dateNum = date.getDate();
                const fullDate = `${dayName}, ${dateNum} ${MONTHS_INDO[date.getMonth()]} ${date.getFullYear()}`;

                if (i === 0) selectedFullDate = fullDate;

                html += `
                    <button onclick="selectDate('${fullDate}', this)" 
                        class="tab-btn flex flex-col items-center min-w-[80px] p-4 rounded-[1.5rem] transition-all duration-500 border-2 ${i === 0 ? 'bg-indigo-600 border-indigo-600 text-white shadow-[0_10px_30px_rgba(79,70,229,0.3)]' : 'bg-white border-slate-50 text-slate-400 hover:border-indigo-100 hover:bg-indigo-50/10'}">
                        <span class="text-[11px] font-black uppercase tracking-tighter opacity-70">${dayLabel}</span>
                        <span class="text-2xl font-black">${dateNum}</span>
                    </button>
                `;
            }
            dayTabs.innerHTML = html;
        }

        function selectDate(fullDate, el) {
            selectedFullDate = fullDate;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn flex flex-col items-center min-w-[80px] p-4 rounded-[1.5rem] transition-all duration-500 border-2 bg-white border-slate-50 text-slate-400 hover:border-indigo-100 hover:bg-indigo-50/10';
            });
            el.className = 'tab-btn flex flex-col items-center min-w-[80px] p-4 rounded-[1.5rem] transition-all duration-500 border-2 bg-indigo-600 border-indigo-600 text-white shadow-[0_10px_30px_rgba(79,70,229,0.3)]';
            renderTimeline();
        }

        let CLINIC_SCHEDULE = {};

        async function fetchClinicSchedule() {
            try {
                const response = await fetch('/api/schedule');
                CLINIC_SCHEDULE = await response.json();
                renderTimeline();
            } catch (err) {
                console.error("Gagal mengambil jam praktik:", err);
            }
        }

        const FORM_TEMPLATE = `📋 *PENDAFTARAN PASIEN*
🪪 *NIK :* 
👨‍👩‍👦 *Nama Lengkap :* 
⏳️ *TL :* 
🗓 *Hari :* [HARI]
🕓 *Jam visit :* [JAM]
👨‍⚕️ *Dokter :* [DOKTER]
🗒 *Lama/Baru :* 
📍 *Alamat :* 
🦷 *Keluhan :* `;

        function updateBooking(day, time, doctor) {
            let text = FORM_TEMPLATE.replace('[HARI]', day).replace('[JAM]', time).replace('[DOKTER]', doctor);
            bookingLink.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`;
        }

        function parseToMinutes(timeStr) {
            const match = (timeStr || '').match(/(\d{1,2})[:.](\d{2})/);
            if (match) return parseInt(match[1]) * 60 + parseInt(match[2]);
            return null;
        }

        function minutesToTime(m) {
            const h = Math.floor(m / 60);
            const mm = m % 60;
            return `${h.toString().padStart(2, '0')}.${mm.toString().padStart(2, '0')}`;
        }

        function renderTimeline() {
            const dayName = selectedFullDate.split(',')[0].toLowerCase().trim();
            const shifts = CLINIC_SCHEDULE[dayName] || [];

            const reservationsToday = allReservations.filter(r => {
                const dbDate = (r.tanggal || '').toLowerCase();
                // Ambil angka tanggal dan bulan saja (seperti "31 maret") agar lebih fleksibel
                const targetMatch = selectedFullDate.toLowerCase().split(',')[1]?.trim(); 
                return targetMatch && dbDate.includes(targetMatch);
            });

            let html = '';
            if (shifts.length === 0) {
                timelineContainer.innerHTML = '<p class="text-center py-20 text-slate-300 italic font-medium">Maaf, pada hari tersebut praktik dokter seang libur.</p>';
                return;
            }

            shifts.forEach(shift => {
                shift.drs.forEach(drName => {
                    html += `
                        <div class="mt-8 mb-4 flex items-center space-x-3 px-2">
                            <div class="h-[2px] w-12 bg-indigo-100 rounded-full"></div>
                            <span class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.2em] leading-none">Dokter Praktik: ${drName}</span>
                        </div>`;

                    for (let min = shift.start; min < shift.end; min += 30) {
                        const jamText = minutesToTime(min);

                        const isTaken = reservationsToday.some(r => {
                            const rMin = parseToMinutes(r.jam);
                            const matchTime = rMin !== null && Math.abs(rMin - min) < 30;
                            const rDoctorName = (r.doctor?.nama || '').toLowerCase();
                            const matchDoc = drName.toLowerCase().split(' ').some(p => p.length > 3 && rDoctorName.includes(p));
                            return matchTime && matchDoc;
                        });

                        const bgClass = isTaken ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-50 hover:border-indigo-200 hover:shadow-md';
                        const titleClass = isTaken ? 'text-slate-400' : 'text-slate-900';
                        const badgeClass = isTaken ? 'tag-booked' : 'tag-available';
                        const statusText = isTaken ? 'TERIMA KASIH (SUDAH DIPESAN)' : 'MASIH TERSEDIA';

                        html += `
                            <div onclick="${isTaken ? '' : `updateBooking('${selectedFullDate}', '${jamText}', '${drName}')`}" 
                                class="flex items-center justify-between p-6 rounded-[2rem] border-2 ${bgClass} transition-all duration-300 mb-3 cursor-pointer group">
                                <div class="flex items-center space-x-8">
                                    <span class="text-2xl font-black ${titleClass} tracking-tighter">${jamText}</span>
                                    <div class="hidden md:block">
                                        <div class="text-[10px] text-slate-300 font-black uppercase tracking-widest leading-none mb-1">Status Slot</div>
                                        <div class="text-xs font-bold text-slate-500">${drName}</div>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <span class="status-badge ${badgeClass} text-[10px] py-1.5 px-4 rounded-2xl transform transition group-hover:scale-105">${statusText}</span>
                                    ${!isTaken ? '<span class="text-indigo-400 text-2xl font-light transform transition group-hover:translate-x-1">→</span>' : ''}
                                </div>
                            </div>
                        `;
                    }
                });
            });
            timelineContainer.innerHTML = html;
        }

        init();
    </script>
</body>

</html>
